services:
  ignition:
    image: inductiveautomation/ignition:8.3.4
    container_name: ignition_gibraltar
    ports:
      - "8088:8088"
      - "8043:8043"
    environment:
      - ACCEPT_IGNITION_EULA=Y
      - GATEWAY_ADMIN_USERNAME=${IGNITION_ADMIN_USERNAME}
      - GATEWAY_ADMIN_PASSWORD=${IGNITION_ADMIN_PASSWORD}
      - IGNITION_EDITION=standard
      - TZ=${TZ}
      - GATEWAY_MODULES_ENABLED=all
    # n - Ignition Gateway Name
    # m - Max Memory (in MB)
    command: >
      -n ignition-gibraltar
      -m 4096
      --
      wrapper.java.initmemory=512
      -Dignition.allowunsignedmodules=true
    volumes:
      - ignition_data_gibraltar:/usr/local/bin/ignition/data
    restart: always
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: postgres_gibraltar
    environment:
      POSTGRES_DB: ignition_gibraltar
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres_data_gibraltar:/var/lib/postgresql/data
    restart: always

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer_gibraltar
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data_gibraltar:/data
    restart: always

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle_gibraltar
    ports:
      - "8080:8080"
    environment:
      DOZZLE_LEVEL: info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

volumes:
  ignition_data_gibraltar:
  postgres_data_gibraltar:
  portainer_data_gibraltar:
