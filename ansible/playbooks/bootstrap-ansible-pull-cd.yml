---
- name: Bootstrap ansible-pull based CD on target server
  hosts: "{{ target_hosts | default('ignition_servers') }}"
  become: true
  vars:
    git_repo_url: "{{ lookup('env', 'IGNITION_SOURCE_REPO_URL') }}"
    git_branch: "{{ lookup('env', 'IGNITION_SOURCE_REPO_BRANCH') }}"
    cd_work_dir: /opt/gibraltar-cd
    cd_timer_on_calendar: "*:0/5"
    ansible_pull_inventory: ansible/inventories/hosts.yml
    ansible_pull_playbook: ansible/playbooks/deploy-ignition.yml

  pre_tasks:
    - name: Validate required git settings are provided
      ansible.builtin.assert:
        that:
          - git_repo_url | length > 0
          - git_branch | length > 0
        fail_msg: >-
          Set IGNITION_SOURCE_REPO_URL and IGNITION_SOURCE_REPO_BRANCH in .env.

  tasks:
    - name: Ensure CD working directory exists
      ansible.builtin.file:
        path: "{{ cd_work_dir }}"
        state: directory
        mode: "0755"

    - name: Ensure CD config directory exists
      ansible.builtin.file:
        path: /etc/gibraltar-cd
        state: directory
        mode: "0750"

    - name: Install ansible-pull runner script
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/gibraltar-ansible-pull.sh.j2"
        dest: /usr/local/bin/gibraltar-ansible-pull.sh
        mode: "0750"

    - name: Install systemd service
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/gibraltar-ansible-pull.service.j2"
        dest: /etc/systemd/system/gibraltar-ansible-pull.service
        mode: "0644"

    - name: Install systemd timer
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/gibraltar-ansible-pull.timer.j2"
        dest: /etc/systemd/system/gibraltar-ansible-pull.timer
        mode: "0644"

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start ansible-pull timer
      ansible.builtin.systemd:
        name: gibraltar-ansible-pull.timer
        enabled: true
        state: started
