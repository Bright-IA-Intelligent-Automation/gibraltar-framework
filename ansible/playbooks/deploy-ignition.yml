---
- name: Deploy approved Ignition source into Docker named volume
  hosts: "{{ target_hosts | default('ignition_servers') }}"
  become: true
  vars:
    ignition_source_repo_checkout_dir: "{{ lookup('env', 'IGNITION_SOURCE_CHECKOUT_DIR') | default('/opt/gibraltar-cd/repo', true) }}"
    ignition_source_subpath: "{{ lookup('env', 'IGNITION_SOURCE_SUBPATH') | default('', true) }}"
    ignition_source_root: >-
      {{
        ignition_source_repo_checkout_dir
        if (ignition_source_subpath | length) == 0
        else (ignition_source_repo_checkout_dir ~ '/' ~ ignition_source_subpath)
      }}
    ignition_folders:
      - projects
      - config/resources
    ignition_volume_data_path: "/var/lib/docker/volumes/{{ ignition_volume_name }}/_data"

  tasks:
    - name: Ensure release path exists
      ansible.builtin.file:
        path: "{{ ignition_release_path }}"
        state: directory
        mode: "0755"

    - name: Ensure backup path exists
      ansible.builtin.file:
        path: "{{ ignition_backup_path }}"
        state: directory
        mode: "0755"

    - name: Stage approved Ignition source on target
      ansible.posix.synchronize:
        src: "{{ ignition_source_root }}/"
        dest: "{{ ignition_release_path }}/ignition-src/"
        delete: true
        recursive: true

    - name: Ensure tracked source folders exist in staged content
      ansible.builtin.file:
        path: "{{ ignition_release_path }}/ignition-src/{{ item }}"
        state: directory
        mode: "0755"
      loop: "{{ ignition_folders }}"

    - name: Create backup of current named volume content
      ansible.builtin.command:
        cmd: >-
          docker run --rm
          -v {{ ignition_volume_name }}:/data:ro
          -v {{ ignition_backup_path }}:/backup
          alpine:3.20
          sh -lc 'tar -czf /backup/ignition-data-$(date +%Y%m%d-%H%M%S).tar.gz -C /data {{ ignition_folders | join(" ") }} 2>/dev/null || true'

    - name: Ensure tracked folders exist in Ignition volume path
      ansible.builtin.file:
        path: "{{ ignition_volume_data_path }}/{{ item }}"
        state: directory
        mode: "0755"
      loop: "{{ ignition_folders }}"

    - name: Sync tracked folders into Ignition volume
      ansible.posix.synchronize:
        src: "{{ ignition_release_path }}/ignition-src/{{ item }}/"
        dest: "{{ ignition_volume_data_path }}/{{ item }}/"
        delete: true
        recursive: true
      loop: "{{ ignition_folders }}"
